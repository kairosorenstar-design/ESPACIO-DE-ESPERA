    @layer theme {
        :root {
            --primary-color: #dc2626;
            --secondary-color: #1f2937;
            --accent-color: #f59e0b;
            --text-primary: #1f2937;
            --text-secondary: #6b7280;
            --background-light: #f8f9fa;
            --background-dark: #000000;
        }
        
        .night-mode {
            --background-light: #000000;
            --background-dark: #000000;
        }
    }

    @layer base {
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
    }

    @layer components {
        .animated-bg {
            background: linear-gradient(45deg, 
                var(--background-light) 0%,
                #f3f4f6 8.33%,
                #e5e7eb 16.66%,
                #d1d5db 25%,
                #9ca3af 33.33%,
                #6b7280 41.66%,
                #4b5563 50%,
                #374151 58.33%,
                #1f2937 66.66%,
                #111827 75%,
                #0f172a 83.33%,
                #0c0a09 91.66%,
                var(--background-dark) 100%);
            background-size: 1400% 1400%;
            animation: gradientShift 40s ease-in-out infinite;
            transition: background 1.5s ease;
        }
        
        .night-mode .animated-bg {
            background: var(--background-dark);
            animation: none;
        }
        
        .night-mode-toggle {
            @apply fixed top-4 right-4 z-50 bg-gray-800 text-white p-3 rounded-full hover:bg-gray-700 transition-colors duration-200;
        }

        .edit-mode-toggle {
            @apply fixed top-4 left-4 z-50 bg-gray-800 bg-opacity-30 text-white p-2 rounded-full hover:bg-opacity-50 transition-all duration-200 opacity-70 hover:opacity-100;
        }

        .category-tabs {
            @apply flex gap-2 mb-6 justify-center;
        }

        .category-tab {
            @apply px-6 py-3 rounded-lg font-medium transition-all duration-200 cursor-pointer;
        }

        .category-tab.active {
            @apply bg-[var(--primary-color)] text-white shadow-lg;
        }

        .category-tab.inactive {
            @apply bg-white bg-opacity-20 text-white hover:bg-opacity-30;
        }

        .btn-primary {
            @apply bg-[var(--primary-color)] text-white px-6 py-2 rounded-lg hover:opacity-90 transition-all duration-200;
        }

        .btn-secondary {
            @apply bg-[var(--secondary-color)] text-white px-4 py-2 rounded-md hover:opacity-90 transition-all duration-200;
        }

        .input-field {
            @apply w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-[var(--primary-color)] focus:border-transparent;
        }

        .link-item {
            @apply bg-white bg-opacity-90 backdrop-blur-sm rounded-lg p-4 mb-3 shadow-md hover:shadow-lg transition-all duration-200;
        }
    }

    @layer utilities {
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            8.33% { background-position: 8.33% 50%; }
            16.67% { background-position: 16.67% 50%; }
            25% { background-position: 25% 50%; }
            33.33% { background-position: 33.33% 50%; }
            41.67% { background-position: 41.67% 50%; }

            58.33% { background-position: 58.33% 50%; }

            75% { background-position: 75% 50%; }
            83.33% { background-position: 83.33% 50%; }
            91.67% { background-position: 91.67% 50%; }
            100% { background-position: 100% 50%; }
